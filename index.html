<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>LOGIN</title>
    <link rel="stylesheet" href="css/login.css">
    <script src="js/login.js" defer></script>
</head>

<body>
    <div class="container">

        <div class="img">
            <div class="layer">
                <img src="assets/Logo.jpeg" alt="Logo da Patrulha Maria da Penha de Mogi Mirim">
            </div>
        </div>

        <div class="form">
            <h1>Entrar no sistema</h1>

            <form id="form">

                <div class="alinhaInput">
                    <label for="cpf">CPF</label>
                    <input type="number" id="cpf" placeholder="Digite seu CPF (valor de teste: 123123)" required>
                </div>

                <div class="alinhaInput">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Digite sua senha (valor de teste: 123)" required>
                </div>

                <p id="mensagem"></p>

                <button type="submit" class="btnLogin">Entrar</button>
            </form>
        </div>

    </div>
</body>

</html>
